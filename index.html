<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday ❤️</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            text-align: center;
            color: white;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        h1 {
            margin-top: 80px;
            font-size: 45px;
        }

        p {
            font-size: 20px;
            width: 70%;
            margin: auto;
        }

        img {
            width: 220px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 20px pink;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 18px;
            background: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: pink;
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>

</head>

<body>

    <h1>Happy Birthday My Love ❤️</h1>

    <img src="d:\birthday.html\her2.jpeg">
    <p>
        You are the most beautiful part of my life 💖  
        I’m so lucky to have you.  
        I hope your day is filled with love and happiness 🌸
    </p>

    <button onclick="surprise()">Click for Surprise 🎁</button>

    <!-- Music -->
    <audio id="bg-music" autoplay loop>
        <source src="d:\birthday.html\song.mp3" type="audio/mpeg">
    </audio>

    <script>
        function surprise() {
            alert("You are my everything ❤️ I love you forever 💕");
        }

        // Generate floating hearts
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);
    </script>
    <script>
  const music = document.getElementById("bg-music");

  document.body.addEventListener("click", () => {
    music.play();
  }, { once: true });
</script>

</body>
</html>
